version: 2.1

jobs:
  build_job:
    docker:
      - image: cimg/python:3.10

    steps:
      - checkout

      - run:
          name: Install dependencies
          command: |
            pip install pandas numpy matplotlib seaborn scikit-learn jupyter nbconvert notebook

      - run:
          name: Show files
          command: |
            ls -la

      - run:
          name: Run notebook (debug mode)
          command: |
            jupyter nbconvert \
              --to notebook \
              --execute growth-analysis.ipynb \
              --output executed.ipynb \
              --ExecutePreprocessor.timeout=600 \
              --ExecutePreprocessor.kernel_name=python3

      - run:
          name: Confirm output
          command: |
            ls -la

workflows:
  version: 2
  build_and_test:
    jobs:
      - build_job