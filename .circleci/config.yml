version: 2.1

jobs:
  build_job:
    docker:
      - image: cimg/python:3.10

    steps:
      - checkout

      - run:
          name: Install dependencies
          command: |
            pip install pandas numpy matplotlib seaborn scikit-learn jupyter nbconvert notebook

      - run:
          name: Debug workspace
          command: |
            pwd
            ls -la
            find . -maxdepth 2 -type f | sort

      - run:
          name: Validate required files exist
          command: |
            test -f "growth_analysis_ci.ipynb"
            test -f "sample_data.csv"

      - run:
          name: Run notebook in CI mode
          command: |
            export CI=true
            jupyter nbconvert \
              --to notebook \
              --execute "growth_analysis_ci.ipynb" \
              --output executed.ipynb \
              --ExecutePreprocessor.timeout=600 \
              --ExecutePreprocessor.kernel_name=python3

      - run:
          name: Confirm outputs
          command: |
            ls -la
            test -f "executed.ipynb"
            test -f "hourly_growth_analysis_summary.csv"

workflows:
  version: 2
  build_and_test:
    jobs:
      - build_job
