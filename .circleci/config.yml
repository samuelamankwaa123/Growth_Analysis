version: 2.1

jobs:
  build_job:
    docker:
      - image: cimg/python:3.10

    steps:
      - checkout

      - run:
          name: Install dependencies
          command: |
            pip install pandas numpy matplotlib seaborn scikit-learn jupyter nbconvert notebook kagglehub

      - run:
          name: Show files
          command: |
            ls -la

      - run:
          name: Validate notebook exists
          command: |
            test -f growth-analysis.ipynb

      - run:
          name: Smoke test Python imports
          command: |
            python - <<'PY'
            import pandas
            import numpy
            import matplotlib
            import seaborn
            import sklearn
            import kagglehub
            print("All imports successful")
            PY

      - run:
          name: Validate notebook format
          command: |
            jupyter nbconvert --to script growth-analysis.ipynb --output growth_analysis_check.py
            test -f growth_analysis_check.py
            ls -la

      - run:
          name: Simple pipeline test
          command: |
            echo "CircleCI pipeline is running successfully"

workflows:
  version: 2
  build_and_test:
    jobs:
      - build_job
