version: 2.1

jobs:
  build_job:
    docker:
      - image: cimg/python:3.10

    steps:
      - checkout

      - run:
          name: Install dependencies
          command: |
            pip install pandas numpy matplotlib seaborn scikit-learn jupyter nbconvert notebook

      - run:
          name: Show all files (DEBUG)
          command: |
            echo "Current directory:"
            pwd
            echo
            echo "Root file listing:"
            ls -la
            echo
            echo "All files recursively:"
            find . -type f | sort
            echo
            echo "Git branch:"
            git rev-parse --abbrev-ref HEAD || true

      - run:
          name: Validate required files
          command: |
            echo "Checking growth_analysis_ci.ipynb..."
            test -f "growth_analysis_ci.ipynb"

            echo "Checking sample_data.csv..."
            test -f "sample_data.csv"

            echo "All required files found."

      - run:
          name: Run notebook in CI mode
          command: |
            export CI=true
            jupyter nbconvert \
              --to notebook \
              --execute "growth_analysis_ci.ipynb" \
              --output executed.ipynb \
              --ExecutePreprocessor.timeout=600 \
              --ExecutePreprocessor.kernel_name=python3

      - run:
          name: Confirm output
          command: |
            ls -la
            test -f "executed.ipynb"
            test -f "hourly_growth_analysis_summary.csv"

workflows:
  version: 2
  build_and_test:
    jobs:
      - build_job
